<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedback you are given to us</title>
</head>
<body>
    <h1><strong>Submit feedback</strong></h1>
    <main>
        <form>
            <fieldset>
                <legend>there is feedback for us and you are given us</legend>
                   <label for="name">Full Name</label>
                   <input type="text" id="name" placeholder="Enter your full name" required><br><br>
                   <label for="email">Email Address</label>
                   <input type="email" id="email" placeholder="Enter your email" required><br><br>
                   <label>Overall Experience</label>
                <div class="radio-group"><br><br>
                    <label><input type="radio" name="experience">Excellent</label>
                    <label><input type="radio" name="experience">Good</label>
                    <label><input type="radio" name="experience">Poor</label>
                </div>
                <label>What did you like?</label>
                <div class="checkbox-group"><br><br>
                    <label><input type="checkbox">Design</label>
                    <label><input type="checkbox">Content</label>
                    <label><input type="checkbox">Performance</label>
                </div>
                <label for="feedbackType">Feedback Type</label>
                <select id="feedbackType"><br><br>
                    <option>Select Feedback Type</option>
                    <option>Suggestion</option>
                    <option>Complaint</option>
                    <option>Bug Report</option>
                    <option>Compliment</option>
                </select>
                <label for="message">Your Feedback</label>
                <textarea id="message" rows="5" placeholder="Write your feedback here..."></textarea><br><br>
                <button type="submit" arial-label="submit your wastless feedback">Submit Feedback</button>
            </fieldset>
        </form>
    </main>
    <footer>
        <nav>
            <ul>
                <li><a href="final.html">go to home</a></li>
            </ul>
        </nav>
    </footer>
</body>
</html>
